version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: course-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-course_app}
      # Fallback if DB_PASSWORD evaluates to empty on some compose versions
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # Override the DB_HOST from .env (which might be 'localhost') to point to the 'db' service in Docker Compose
      DB_HOST: db
    ports:
      - "${PORT:-4000}:${PORT:-4000}"

volumes:
  postgres_data:
